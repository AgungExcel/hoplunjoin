<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allocation HopLun Unit 2</title>
    <!-- Favicon Tab Browser -->
    <link rel="icon" href="hoplun128.png" type="image/png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menerjemahkan JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom Sticky Scrollbar */
        .sticky-col { position: sticky; left: 0; z-index: 20; }
        .sticky-col-2 { position: sticky; left: 45px; z-index: 20; }
        .sticky-col-3 { position: sticky; left: 245px; z-index: 20; }
        .hide-scroll::-webkit-scrollbar { height: 8px; }
        .hide-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;
        const { createClient } = supabase;

        // Ikon SVG Modern
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconBarChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;

        // Supabase Setup
        const supabaseUrl = 'https://slqolbmmcwanrljaaddw.supabase.co';
        const supabaseKey = 'sb_publishable_VZUYV9JR3sKiAZIX_dhU2g_rOO9LDrl';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const defaultMonths = ['Mar-26', 'Apr-26', 'May-26', 'Jun-26'];
        const defaultGroups = [
            { id: 'g1', name: 'EMPLOYEE CATEGORIES', categories: ['DIRECT SEWER', 'EXPERIENCE', 'VOCATIONAL SCHOOL GRADUATE'] }
        ];

        // --- Palet Warna Inline ---
        const colors = {
            headerBg: '#1e293b', headerText: '#ffffff',
            totalAllBg: '#4f46e5', totalAllText: '#ffffff',
            subHeaderBg: '#f1f5f9', subHeaderText: '#334155',
            rowEven: '#ffffff', rowOdd: '#f8fafc',
            totalRowBg: '#e0e7ff', totalRowText: '#3730a3',
            border: '#cbd5e1', thickBorder: '#475569',
            textNormal: '#1e293b', textRed: '#dc2626', textGreen: '#16a34a'
        };

        const thickRight = { borderRight: `3px solid ${colors.thickBorder}` };

        // Helper Format Warna
        const getNumberStyle = (actual, target, isBalance = false) => {
            const different = target - actual;
            let color = colors.textNormal;
            let fontWeight = 'normal';

            if (target > 0) {
                if (different > 0) {
                    color = colors.textRed; fontWeight = 'bold'; // Defisit (Merah)
                } else if (different === 0) {
                    color = colors.textGreen; fontWeight = 'bold'; // Pas Target (Hijau)
                }
            }
            return { color, fontWeight };
        };

        // --- HELPER UNTUK TANGGAL DINAMIS ---
        const getDaysInMonth = (monthStr) => {
            if(!monthStr) return 30;
            const [mStr, yStr] = monthStr.split('-');
            const mMap = { 'Jan':0, 'Feb':1, 'Mar':2, 'Apr':3, 'May':4, 'Jun':5, 'Jul':6, 'Aug':7, 'Sep':8, 'Oct':9, 'Nov':10, 'Dec':11 };
            return new Date(2000 + parseInt(yStr), mMap[mStr] + 1, 0).getDate();
        };

        const getMonthRange = (monthStr) => {
            if(!monthStr) return { start: 1, end: 30 };
            const end = getDaysInMonth(monthStr);
            let start = 1;
            // Template khusus bulan Maret dimulai dari tanggal 25
            if (monthStr === 'Mar-26') start = 25;
            return { start, end };
        };

        const getDaysArray = (monthStr) => {
            const { start, end } = getMonthRange(monthStr);
            return Array.from({length: end - start + 1}, (_, i) => start + i);
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            const [viewMode, setViewMode] = useState('monthly'); // 'monthly' | 'daily'
            
            const [months, setMonths] = useState(defaultMonths);
            const [groups, setGroups] = useState(defaultGroups);
            const [dailyData, setDailyData] = useState({});
            
            const [selectedMonth, setSelectedMonth] = useState('Apr-26');
            const [selectedDate, setSelectedDate] = useState(() => getMonthRange('Apr-26').start);
            const [inputType, setInputType] = useState('actual');
            
            const [newMonthStr, setNewMonthStr] = useState('');
            const [newGroupStr, setNewGroupStr] = useState('');
            const [newCategoryStr, setNewCategoryStr] = useState('');
            const [selectedGroupForCat, setSelectedGroupForCat] = useState('g1');

            const [messageModal, setMessageModal] = useState('');
            const [confirmModal, setConfirmModal] = useState(null);
            
            const [syncStatus, setSyncStatus] = useState('connecting'); 
            const isLocalChange = useRef(false);

            useEffect(() => {
                const fetchAndSubscribe = async () => {
                    const { data, error } = await supabaseClient.from('karyawan_data').select('*').eq('id', 'main_doc').single();

                    if (data) {
                        isLocalChange.current = false;
                        setMonths(data.months || defaultMonths);
                        
                        let loadedGroups = defaultGroups;
                        if (data.categories) {
                            if (data.categories.length > 0 && typeof data.categories[0] === 'object') loadedGroups = data.categories;
                            else loadedGroups = [{ id: 'g1', name: 'EMPLOYEE CATEGORIES', categories: data.categories }];
                        }
                        setGroups(loadedGroups);
                        if(loadedGroups.length > 0) setSelectedGroupForCat(loadedGroups[0].id);

                        let loadedDaily = {};
                        if (data.actuals) {
                            const firstM = data.months[0];
                            const sampleData = data.actuals[firstM];
                            if (sampleData && typeof sampleData[Object.keys(sampleData)[0]] !== 'object') {
                                // Migrasi data lama
                                data.months.forEach(m => {
                                    const { start } = getMonthRange(m);
                                    loadedDaily[m] = { [start]: {} };
                                    loadedGroups.forEach(g => {
                                        g.categories.forEach(c => {
                                            loadedDaily[m][start][c] = {
                                                target: data.budgets?.[m]?.[c] || 0,
                                                actual: data.actuals?.[m]?.[c] || 0
                                            };
                                        });
                                    });
                                });
                            } else {
                                loadedDaily = data.actuals;
                            }
                        }
                        setDailyData(loadedDaily);

                        if (data.months && data.months.length > 0 && !data.months.includes(selectedMonth)) {
                            setSelectedMonth(data.months[0]);
                            setSelectedDate(getMonthRange(data.months[0]).start);
                        }
                        setSyncStatus('synced');
                    } else {
                        if (error && error.code === 'PGRST116') setSyncStatus('synced');
                        else if (error && error.code === 'PGRST205') {
                            console.warn("Tabel belum dibuat di Supabase.");
                            setSyncStatus('error');
                            setMessageModal('PENTING: Tabel "karyawan_data" belum ada di Supabase. Buat melalui SQL Editor.');
                        } else setSyncStatus('error');
                    }

                    const channel = supabaseClient.channel('schema-db-changes').on(
                        'postgres_changes', { event: '*', schema: 'public', table: 'karyawan_data', filter: 'id=eq.main_doc' },
                        (payload) => {
                            if (payload.new) {
                                isLocalChange.current = false;
                                setMonths(payload.new.months || defaultMonths);
                                setGroups(payload.new.categories || defaultGroups);
                                setDailyData(payload.new.actuals || {});
                            }
                        }
                    ).subscribe();

                    return () => supabaseClient.removeChannel(channel);
                };
                fetchAndSubscribe();
            }, []);

            useEffect(() => {
                if (!isLocalChange.current) return;
                setSyncStatus('saving');
                const timeoutId = setTimeout(async () => {
                    const payload = { id: 'main_doc', months: months, categories: groups, actuals: dailyData, budgets: {} };
                    localStorage.setItem('karyawan_data_local', JSON.stringify(payload));
                    try {
                        const { error } = await supabaseClient.from('karyawan_data').upsert(payload);
                        if (error) throw error;
                        setSyncStatus('synced');
                        isLocalChange.current = false;
                    } catch (error) {
                        if (error.code === 'PGRST205') isLocalChange.current = false;
                        setSyncStatus('error');
                    }
                }, 800);
                return () => clearTimeout(timeoutId);
            }, [months, groups, dailyData]);

            // --- LOGIKA KALKULASI DATA (TARGET MENGIKUTI SISA/DIFF HARI SEBELUMNYA) ---
            const calculatedData = useMemo(() => {
                const calcDaily = {}; 
                const calcMonthly = {};
                const grandTotals = {}; 
                
                const allCats = groups.flatMap(g => g.categories);
                allCats.forEach(cat => { grandTotals[cat] = { b: 0, a: 0, diff: 0 }; });

                months.forEach(month => {
                    calcDaily[month] = {};
                    calcMonthly[month] = {};
                    allCats.forEach(cat => calcMonthly[month][cat] = { target: 0, actual: 0, diff: 0 });

                    const { start, end } = getMonthRange(month);
                    
                    allCats.forEach(cat => {
                        let currentTarget = 0;
                        let monthlyActualSum = 0;

                        for(let d = start; d <= end; d++) {
                            if (!calcDaily[month][d]) calcDaily[month][d] = {};
                            
                            // Pada tanggal PERTAMA di bulan tersebut, Target diambil dari input awal
                            if (d === start) {
                                currentTarget = dailyData[month]?.[d]?.[cat]?.target || 0;
                                calcMonthly[month][cat].target = currentTarget; // Target total bulanan
                            }

                            const actual = dailyData[month]?.[d]?.[cat]?.actual || 0;
                            
                            // Hitung Sisa (Diff)
                            let diff = currentTarget - actual;
                            // Cegah target menjadi minus (jika target sdh terpenuhi / actual berlebih)
                            if (diff < 0) diff = 0; 

                            calcDaily[month][d][cat] = { target: currentTarget, actual, diff };
                            
                            monthlyActualSum += actual;
                            // Target untuk hari esok adalah SISA (Diff) dari hari ini
                            currentTarget = diff; 
                        }

                        calcMonthly[month][cat].actual = monthlyActualSum;
                        let mDiff = calcMonthly[month][cat].target - monthlyActualSum;
                        if (mDiff < 0) mDiff = 0;
                        calcMonthly[month][cat].diff = mDiff;

                        grandTotals[cat].b += calcMonthly[month][cat].target;
                        grandTotals[cat].a += calcMonthly[month][cat].actual;
                        grandTotals[cat].diff += calcMonthly[month][cat].diff;
                    });
                });

                // Total Vertikal per Bulan
                const monthlyVertTotals = {};
                months.forEach(m => {
                    let tb=0, ta=0, tdiff=0;
                    allCats.forEach(c => { tb+=calcMonthly[m][c].target; ta+=calcMonthly[m][c].actual; tdiff+=calcMonthly[m][c].diff; });
                    monthlyVertTotals[m] = { target: tb, actual: ta, diff: tdiff };
                });

                // Total Vertikal per Hari (Jika mode Harian)
                const dailyVertTotals = {};
                if(viewMode === 'daily') {
                    const daysArr = getDaysArray(selectedMonth);
                    daysArr.forEach(d => {
                        let tb=0, ta=0, tdiff=0;
                        allCats.forEach(c => { 
                            tb+=calcDaily[selectedMonth][d][c].target; 
                            ta+=calcDaily[selectedMonth][d][c].actual; 
                            tdiff+=calcDaily[selectedMonth][d][c].diff; 
                        });
                        dailyVertTotals[d] = { target: tb, actual: ta, diff: tdiff };
                    });
                }

                let finalGb=0, finalGa=0, finalGdiff=0;
                allCats.forEach(c => { finalGb+=grandTotals[c].b; finalGa+=grandTotals[c].a; finalGdiff+=grandTotals[c].diff; });
                const finalGrandTotal = { target: finalGb, actual: finalGa, diff: finalGdiff };

                return { calcDaily, calcMonthly, grandTotals, monthlyVertTotals, dailyVertTotals, finalGrandTotal, allCats };
            }, [months, groups, dailyData, viewMode, selectedMonth]);

            // --- HANDLERS ---
            const handleInputChange = (cat, value) => {
                isLocalChange.current = true;
                const numValue = value === '' ? '' : Number(value);
                setDailyData(prev => ({
                    ...prev,
                    [selectedMonth]: {
                        ...prev[selectedMonth],
                        [selectedDate]: {
                            ...(prev[selectedMonth]?.[selectedDate] || {}),
                            [cat]: {
                                ...(prev[selectedMonth]?.[selectedDate]?.[cat] || { target:0, actual:0 }),
                                [inputType]: numValue
                            }
                        }
                    }
                }));
            };

            const handleAddMonth = () => {
                if (!newMonthStr.trim() || months.includes(newMonthStr.trim())) return;
                isLocalChange.current = true;
                setMonths(prev => [...prev, newMonthStr.trim()]);
                setNewMonthStr('');
            };

            const handleDeleteMonth = (monthToDelete) => {
                if (months.length <= 1) { setMessageModal('Minimal harus ada 1 bulan tersisa!'); return; }
                setConfirmModal({
                    message: `Yakin hapus kolom bulan ${monthToDelete}?`,
                    onConfirm: () => {
                        isLocalChange.current = true;
                        const newMonths = months.filter(m => m !== monthToDelete);
                        setMonths(newMonths);
                        if (selectedMonth === monthToDelete) {
                            setSelectedMonth(newMonths[0]);
                            setSelectedDate(getMonthRange(newMonths[0]).start);
                        }
                    }
                });
            };

            const handleAddGroup = () => {
                if(!newGroupStr.trim()) return;
                isLocalChange.current = true;
                const newG = { id: generateId(), name: newGroupStr.trim().toUpperCase(), categories: [] };
                setGroups(prev => [...prev, newG]);
                setNewGroupStr('');
                setSelectedGroupForCat(newG.id);
            };

            const handleRenameGroup = (groupId, oldName) => {
                const newName = window.prompt("Ubah nama Grup:", oldName);
                if(newName && newName.trim() !== oldName) {
                    isLocalChange.current = true;
                    setGroups(prev => prev.map(g => g.id === groupId ? {...g, name: newName.trim().toUpperCase()} : g));
                }
            };

            const handleDeleteGroup = (groupId, name) => {
                if(groups.length <= 1) { setMessageModal('Minimal harus ada 1 Grup tersisa!'); return; }
                setConfirmModal({
                    message: `Hapus grup ${name} beserta isinya?`,
                    onConfirm: () => { isLocalChange.current = true; setGroups(prev => prev.filter(g => g.id !== groupId)); }
                });
            };

            const handleAddCategory = () => {
                const catName = newCategoryStr.trim().toUpperCase();
                if (!catName || calculatedData.allCats.includes(catName)) { setMessageModal("Kategori sudah ada atau kosong!"); return; }
                isLocalChange.current = true;
                setGroups(prev => prev.map(g => g.id === selectedGroupForCat ? {...g, categories: [...g.categories, catName]} : g));
                setNewCategoryStr('');
            };

            const handleRenameCategory = (groupId, oldCat) => {
                const newCat = window.prompt("Ubah nama Kategori:", oldCat);
                if(newCat && newCat.trim() !== oldCat) {
                    const cleaned = newCat.trim().toUpperCase();
                    if(calculatedData.allCats.includes(cleaned)) { setMessageModal("Nama Kategori sudah digunakan!"); return; }
                    isLocalChange.current = true;
                    setGroups(prev => prev.map(g => g.id === groupId ? {...g, categories: g.categories.map(c => c === oldCat ? cleaned : c)} : g));
                    setDailyData(prev => {
                        const next = JSON.parse(JSON.stringify(prev));
                        Object.keys(next).forEach(m => {
                            Object.keys(next[m]).forEach(d => {
                                if (next[m][d][oldCat] !== undefined) {
                                    next[m][d][cleaned] = next[m][d][oldCat];
                                    delete next[m][d][oldCat];
                                }
                            });
                        });
                        return next;
                    });
                }
            };

            const handleDeleteCategory = (groupId, catName) => {
                const group = groups.find(g => g.id === groupId);
                if (groups.length === 1 && group.categories.length <= 1) { setMessageModal('Harus ada setidaknya 1 Kategori tersisa!'); return; }
                setConfirmModal({
                    message: `Hapus Kategori ${catName}?`,
                    onConfirm: () => { isLocalChange.current = true; setGroups(prev => prev.map(g => g.id === groupId ? {...g, categories: g.categories.filter(c => c !== catName)} : g)); }
                });
            };

            const handleClearData = () => {
                setConfirmModal({
                    message: 'Reset semua data kembali ke pengaturan awal?',
                    onConfirm: () => {
                        isLocalChange.current = true;
                        setMonths(defaultMonths); setGroups(defaultGroups); setDailyData({}); 
                        setSelectedMonth(defaultMonths[0]); setSelectedDate(getMonthRange(defaultMonths[0]).start);
                    }
                });
            };

            const handleExportExcelWithStyle = () => {
                const table = document.getElementById('dataTable').outerHTML;
                const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"/><style>table { border-collapse: collapse; font-family: sans-serif; font-size: 13px; } th, td { border: 1px solid ${colors.border}; padding: 8px; }</style></head><body>${table}</body></html>`;
                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `Allocation_Unit2_${viewMode}.xls`; a.click(); URL.revokeObjectURL(url);
            };

            // --- STYLING TABLE ---
            const cellStyle = { border: `1px solid ${colors.border}`, padding: '0.5rem 0.75rem', minWidth: '80px' };
            const headerStyle = { ...cellStyle, backgroundColor: colors.headerBg, color: colors.headerText, fontWeight: '600', textTransform: 'uppercase', fontSize: '0.75rem' };
            const subHeaderStyle = { ...cellStyle, backgroundColor: colors.subHeaderBg, color: colors.subHeaderText, fontWeight: '600', fontSize: '0.8rem' };
            const totalAllHeaderStyle = { ...headerStyle, backgroundColor: colors.totalAllBg };

            const renderTableBody = (dataSource, getColData, thickDividerStyle) => {
                let globalIndex = 1;
                return groups.map((group, gIdx) => (
                    <React.Fragment key={group.id}>
                        {group.categories.map((cat, cIdx) => {
                            const isFirst = cIdx === 0;
                            const bgColor = globalIndex++ % 2 === 0 ? colors.rowEven : colors.rowOdd;
                            
                            return (
                                <tr key={cat} className="hover:bg-slate-50">
                                    {isFirst && <td rowSpan={group.categories.length} className="sticky-col bg-white text-center font-bold" style={{...cellStyle, verticalAlign: 'middle', borderRight: '1px solid #cbd5e1', left:0, zIndex:10}}>
                                        <div className="flex flex-col items-center gap-1">
                                            <span>{gIdx + 1}</span>
                                            <div className="flex gap-1 text-slate-400">
                                                <button onClick={() => handleRenameGroup(group.id, group.name)} title="Rename Grup"><IconEdit /></button>
                                                <button onClick={() => handleDeleteGroup(group.id, group.name)} className="hover:text-red-500" title="Hapus Grup"><IconX /></button>
                                            </div>
                                        </div>
                                    </td>}
                                    {isFirst && <td rowSpan={group.categories.length} className="sticky-col-2 bg-slate-100 text-center font-bold tracking-wide" style={{...cellStyle, verticalAlign: 'middle', borderRight: '1px solid #cbd5e1', left:'45px', zIndex:10}}>
                                        <span style={{writingMode: 'vertical-rl', transform: 'rotate(180deg)'}} className="py-2 text-indigo-800">{group.name}</span>
                                    </td>}
                                    
                                    <td className="sticky-col-3 bg-white text-left font-medium" style={{...cellStyle, left:'100px', zIndex:10, backgroundColor: bgColor}}>
                                        <div className="flex justify-between items-center w-[180px]">
                                            <span className="truncate">{cat}</span>
                                            <div className="flex gap-1 text-slate-300">
                                                <button onClick={() => handleRenameCategory(group.id, cat)} className="hover:text-blue-500"><IconEdit /></button>
                                                <button onClick={() => handleDeleteCategory(group.id, cat)} className="hover:text-red-500"><IconX /></button>
                                            </div>
                                        </div>
                                    </td>
                                    
                                    {isFirst && <td style={{...cellStyle, backgroundColor: colors.rowEven, textAlign: 'left', color: colors.subHeaderText, ...thickDividerStyle}}>Requirement</td>}
                                    {cIdx === 1 && <td rowSpan={Math.max(1, group.categories.length - 1)} style={{...cellStyle, backgroundColor: colors.rowEven, textAlign: 'left', color: colors.subHeaderText, verticalAlign: 'middle', ...thickDividerStyle}}>Target</td>}
                                    {cIdx > 1 && group.categories.length === 1 && <td style={{...cellStyle, ...thickDividerStyle}}></td>} 
                                    
                                    {dataSource.map(colId => {
                                        const data = getColData(colId, cat);
                                        const actualStyle = getNumberStyle(data.actual, data.target, false);
                                        const diffStyle = getNumberStyle(data.actual, data.target, true);

                                        return (
                                            <React.Fragment key={`${cat}-${colId}`}>
                                                <td style={{...cellStyle, backgroundColor: bgColor}}>{data.target}</td>
                                                <td style={{...cellStyle, backgroundColor: bgColor, color: actualStyle.color, fontWeight: actualStyle.fontWeight}}>{data.actual}</td>
                                                <td style={{...cellStyle, backgroundColor: bgColor, color: diffStyle.color, fontWeight: diffStyle.fontWeight, ...thickDividerStyle}}>{data.diff}</td>
                                            </React.Fragment>
                                        )
                                    })}
                                    
                                    {/* Total All (Hanya di mode Bulanan yg relevan secara horizontal, namun di Daily tetap tampil untuk rekap akumulasi bulanan tersebut) */}
                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600'}}>{calculatedData.grandTotals[cat].b}</td>
                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600'}}>{calculatedData.grandTotals[cat].a}</td>
                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600'}}>{calculatedData.grandTotals[cat].diff}</td>
                                </tr>
                            );
                        })}
                    </React.Fragment>
                ));
            };

            return (
                <div className="min-h-screen p-3 sm:p-6 md:p-8 text-slate-800 flex flex-col items-center relative w-full overflow-hidden">
                    {messageModal && (
                        <div className="fixed inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50 px-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-sm text-center">
                                <p className="mb-6 font-medium text-slate-700">{messageModal}</p>
                                <button onClick={() => setMessageModal('')} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl">Mengerti</button>
                            </div>
                        </div>
                    )}

                    {confirmModal && (
                        <div className="fixed inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50 px-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-sm text-center">
                                <p className="mb-6 font-medium text-slate-700">{confirmModal.message}</p>
                                <div className="flex gap-3 w-full">
                                    <button onClick={() => setConfirmModal(null)} className="flex-1 bg-slate-100 text-slate-700 px-4 py-2 rounded-xl">Batal</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal(null); }} className="flex-1 bg-red-600 text-white px-4 py-2 rounded-xl">Ya</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="w-full max-w-[1600px]">
                        {/* HEADER UTAMA */}
                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-5 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <img src="hoplun128.png" alt="Logo" className="h-10 w-auto" onError={e => e.target.style.display='none'} />
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800">Allocation HopLun Unit 2</h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        {syncStatus === 'synced' && <><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div><span className="text-xs text-emerald-700">Realtime Tersinkronisasi</span></>}
                                        {syncStatus === 'error' && <><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div><span className="text-xs text-red-700">Offline / Gagal Sinkron</span></>}
                                        {syncStatus === 'saving' && <><div className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse"></div><span className="text-xs text-amber-700">Menyimpan...</span></>}
                                    </div>
                                </div>
                            </div>
                            
                            {/* TABS VIEW MODE */}
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                <button onClick={() => setViewMode('monthly')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all ${viewMode === 'monthly' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                    <IconBarChart /> Bulanan (Summary)
                                </button>
                                <button onClick={() => setViewMode('daily')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all ${viewMode === 'daily' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                    <IconCalendar /> Harian (Input)
                                </button>
                            </div>
                        </div>

                        {/* PANEL KONTROL (Hanya Aktif jika ViewMode Daily) */}
                        {viewMode === 'daily' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 w-full">
                                {/* Panel Input Harian */}
                                <div className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-indigo-200 overflow-hidden ring-1 ring-indigo-50">
                                    <div className="bg-indigo-600 px-5 py-3 flex justify-between items-center">
                                        <h2 className="text-white font-semibold flex items-center gap-2 text-sm">📝 Panel Input Data Harian</h2>
                                    </div>
                                    <div className="p-4 sm:p-5">
                                        <div className="grid grid-cols-3 gap-3 mb-5">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Bulan</label>
                                                <select value={selectedMonth} onChange={(e) => {
                                                    const newM = e.target.value;
                                                    setSelectedMonth(newM); 
                                                    setSelectedDate(getMonthRange(newM).start);
                                                    setInputType('actual');
                                                }} className="w-full bg-slate-50 border border-slate-200 py-2 px-2 rounded-lg outline-none font-semibold text-sm cursor-pointer">
                                                    {months.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Tanggal</label>
                                                <select value={selectedDate} onChange={(e) => {
                                                    const newD = Number(e.target.value);
                                                    setSelectedDate(newD);
                                                    // Hanya izinkan input Target di tanggal awal bulan tersebut
                                                    if(newD !== getMonthRange(selectedMonth).start) setInputType('actual');
                                                }} className="w-full bg-slate-50 border border-slate-200 py-2 px-2 rounded-lg outline-none font-semibold text-sm cursor-pointer">
                                                    {getDaysArray(selectedMonth).map(d => <option key={d} value={d}>Tgl {d}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Mode Input</label>
                                                <select value={inputType} onChange={(e) => setInputType(e.target.value)} className="w-full bg-indigo-50 border border-indigo-200 text-indigo-700 py-2 px-2 rounded-lg outline-none font-bold text-sm cursor-pointer">
                                                    <option value="actual">Aktual</option>
                                                    {/* Pilihan Target hanya dimunculkan saat memilih tanggal pertama bulan tsb */}
                                                    {selectedDate === getMonthRange(selectedMonth).start && (
                                                        <option value="target">Target (Awal)</option>
                                                    )}
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2 hide-scroll">
                                            {groups.map(g => (
                                                <div key={g.id} className="border border-slate-200 rounded-xl overflow-hidden">
                                                    <div className="bg-slate-100 px-3 py-1.5 text-xs font-bold text-slate-600 uppercase tracking-wider border-b border-slate-200">{g.name}</div>
                                                    <div className="p-2 space-y-2">
                                                        {g.categories.map(cat => (
                                                            <div key={cat} className="flex items-center justify-between gap-3">
                                                                <span className="text-sm font-medium text-slate-700 truncate">{cat}</span>
                                                                <input type="number" value={inputType === 'actual' ? (dailyData[selectedMonth]?.[selectedDate]?.[cat]?.actual ?? '') : (dailyData[selectedMonth]?.[selectedDate]?.[cat]?.target ?? '')} onChange={(e) => handleInputChange(cat, e.target.value)} className="w-24 text-right font-bold text-slate-800 bg-white border border-slate-300 py-1.5 px-2 rounded-lg outline-none focus:border-indigo-500" placeholder="0" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Panel Settings */}
                                <div className="lg:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                        <h3 className="font-semibold text-slate-800 text-sm mb-3">🛠️ Tambah/Edit Grup</h3>
                                        <div className="flex gap-2 mb-4">
                                            <input type="text" value={newGroupStr} onChange={(e) => setNewGroupStr(e.target.value)} className="flex-1 border border-slate-200 px-3 rounded-lg text-sm uppercase" placeholder="Nama Grup Baru" />
                                            <button onClick={handleAddGroup} className="bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-medium">Tambah</button>
                                        </div>
                                        <h3 className="font-semibold text-slate-800 text-sm mb-3 pt-3 border-t">➕ Tambah Kategori</h3>
                                        <div className="flex flex-col gap-2">
                                            <select value={selectedGroupForCat} onChange={e => setSelectedGroupForCat(e.target.value)} className="w-full border border-slate-200 py-2 px-3 rounded-lg text-sm font-medium">
                                                {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                            </select>
                                            <div className="flex gap-2">
                                                <input type="text" value={newCategoryStr} onChange={(e) => setNewCategoryStr(e.target.value)} className="flex-1 border border-slate-200 px-3 rounded-lg text-sm uppercase" placeholder="Nama Kategori..." />
                                                <button onClick={handleAddCategory} className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-medium">Tambah</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                                        <div>
                                            <h3 className="font-semibold text-slate-800 text-sm mb-3">📅 Pengaturan Bulan</h3>
                                            <div className="flex gap-2">
                                                <input type="text" value={newMonthStr} onChange={(e) => setNewMonthStr(e.target.value)} className="flex-1 border border-slate-200 px-3 rounded-lg text-sm" placeholder="Ex: Jul-26" />
                                                <button onClick={handleAddMonth} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-medium">Tambah</button>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-2 mt-4 pt-4 border-t border-slate-100">
                                            <button onClick={handleExportExcelWithStyle} className="w-full flex justify-center items-center gap-2 bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold px-4 py-2.5 rounded-xl hover:bg-emerald-100 transition-colors"><IconDownload/> Export Excel</button>
                                            <button onClick={handleClearData} className="w-full flex justify-center items-center gap-2 bg-red-50 text-red-600 border border-red-200 font-bold px-4 py-2 rounded-xl hover:bg-red-100 transition-colors"><IconTrash/> Reset Data</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Banner Informasi Mode Bulanan */}
                        {viewMode === 'monthly' && (
                            <div className="flex justify-between items-center bg-indigo-50 border border-indigo-200 p-4 rounded-xl mb-6">
                                <p className="text-indigo-800 font-medium text-sm flex items-center gap-2">
                                    <IconBarChart/> Ini adalah Tampilan Ringkasan Bulanan (Data dikalkulasi dari Input Harian). Untuk mengubah angka, beralihlah ke Tampilan Harian.
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={handleExportExcelWithStyle} className="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm hover:bg-emerald-700 flex items-center gap-1"><IconDownload/> Export</button>
                                </div>
                            </div>
                        )}

                        {/* TABEL OUTPUT */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full relative">
                            <div className="overflow-x-auto p-0 m-0 hide-scroll" style={{ WebkitOverflowScrolling: 'touch', maxHeight: '70vh' }}>
                                <table id="dataTable" className="border-collapse min-w-max text-center relative" style={{ border: `1px solid ${colors.border}` }}>
                                    <thead className="sticky top-0 z-30">
                                        <tr>
                                            <th style={{...headerStyle, width:'45px', left:0, zIndex:30}} rowSpan="2" className="sticky-col">NO</th>
                                            <th style={{...headerStyle, width:'20px', left:'45px', zIndex:30}} rowSpan="2" className="sticky-col-2">GRUP</th>
                                            <th style={{...headerStyle, left:'100px', zIndex:30}} rowSpan="2" className="sticky-col-3 w-48 text-left">EMPLOYEE CATEGORIES</th>
                                            <th style={{...headerStyle, ...thickRight}} rowSpan="2" className="w-24 text-left">DETAIL</th>
                                            
                                            {viewMode === 'monthly' 
                                                ? months.map(m => <th key={m} colSpan="3" style={{...headerStyle, ...thickRight}}>{m}</th>)
                                                : getDaysArray(selectedMonth).map(d => <th key={d} colSpan="3" style={{...headerStyle, ...thickRight}}>Tgl {d}</th>)
                                            }
                                            <th colSpan="3" style={{...totalAllHeaderStyle, position:'sticky', right:0, zIndex:30}}>TOTAL ALL</th>
                                        </tr>
                                        <tr>
                                            {viewMode === 'monthly'
                                                ? months.map(m => (
                                                    <React.Fragment key={`sub-${m}`}>
                                                        <th style={subHeaderStyle} className="w-20">Target</th>
                                                        <th style={subHeaderStyle} className="w-20">Actual</th>
                                                        <th style={{...subHeaderStyle, ...thickRight}} className="w-20">Diff</th>
                                                    </React.Fragment>
                                                ))
                                                : getDaysArray(selectedMonth).map(d => (
                                                    <React.Fragment key={`subd-${d}`}>
                                                        <th style={subHeaderStyle} className="w-16">Tgt</th>
                                                        <th style={subHeaderStyle} className="w-16">Act</th>
                                                        <th style={{...subHeaderStyle, ...thickRight}} className="w-16">Diff</th>
                                                    </React.Fragment>
                                                ))
                                            }
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b', position:'sticky', right:'160px', zIndex:30}} className="w-20">Target</th>
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b', position:'sticky', right:'80px', zIndex:30}} className="w-20">Actual</th>
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b', position:'sticky', right:0, zIndex:30}} className="w-20">Diff</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {viewMode === 'monthly' 
                                            ? renderTableBody(months, (m, cat) => calculatedData.calcMonthly[m][cat], thickRight)
                                            : renderTableBody(getDaysArray(selectedMonth), (d, cat) => calculatedData.calcDaily[selectedMonth][d][cat], thickRight)
                                        }
                                        
                                        {/* Baris GRAND TOTAL Terbawah */}
                                        <tr>
                                            <td colSpan="4" style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '800', textAlign: 'center', letterSpacing: '0.05em', ...thickRight, position:'sticky', left:0, zIndex:20}}>GRAND TOTAL</td>
                                            {viewMode === 'monthly'
                                                ? months.map(m => (
                                                    <React.Fragment key={`total-${m}`}>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.monthlyVertTotals[m].target}</td>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.monthlyVertTotals[m].actual}</td>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700', ...thickRight}}>{calculatedData.monthlyVertTotals[m].diff}</td>
                                                    </React.Fragment>
                                                ))
                                                : getDaysArray(selectedMonth).map(d => (
                                                    <React.Fragment key={`totald-${d}`}>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.dailyVertTotals[d].target}</td>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.dailyVertTotals[d].actual}</td>
                                                        <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700', ...thickRight}}>{calculatedData.dailyVertTotals[d].diff}</td>
                                                    </React.Fragment>
                                                ))
                                            }
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '800', position:'sticky', right:'160px', zIndex:20}}>{calculatedData.finalGrandTotal.target}</td>
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '800', position:'sticky', right:'80px', zIndex:20}}>{calculatedData.finalGrandTotal.actual}</td>
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '800', position:'sticky', right:0, zIndex:20}}>{calculatedData.finalGrandTotal.diff}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
