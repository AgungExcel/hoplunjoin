<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Karyawan</title>
    <!-- Favicon Tab Browser -->
    <link rel="icon" href="hoplun128.png" type="image/png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config untuk Font Custom -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menerjemahkan JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;
        const { createClient } = supabase;

        // Ikon SVG Modern
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;

        // Supabase Setup
        const supabaseUrl = 'https://slqolbmmcwanrljaaddw.supabase.co';
        const supabaseKey = 'sb_publishable_VZUYV9JR3sKiAZIX_dhU2g_rOO9LDrl';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const defaultMonths = ['Mar-26', 'Apr-26', 'May-26', 'Jun-26'];
        const defaultCategories = ['DIRECT SEWER', 'EXPERIENCE', 'VOCATIONAL SCHOOL GRADUATE'];
        const defaultBudgets = {
            'Mar-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 0, 'VOCATIONAL SCHOOL GRADUATE': 0 },
            'Apr-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 80, 'VOCATIONAL SCHOOL GRADUATE': 120 },
            'May-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 80, 'VOCATIONAL SCHOOL GRADUATE': 120 },
            'Jun-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 80, 'VOCATIONAL SCHOOL GRADUATE': 120 }
        };
        const defaultActuals = {
            'Mar-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 0, 'VOCATIONAL SCHOOL GRADUATE': 0 },
            'Apr-26': { 'DIRECT SEWER': 70, 'EXPERIENCE': 85, 'VOCATIONAL SCHOOL GRADUATE': 100 },
            'May-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 0, 'VOCATIONAL SCHOOL GRADUATE': 0 },
            'Jun-26': { 'DIRECT SEWER': 0, 'EXPERIENCE': 0, 'VOCATIONAL SCHOOL GRADUATE': 0 }
        };

        // --- Palet Warna Inline (untuk export Excel) ---
        const colors = {
            headerBg: '#1e293b',     // Slate-800
            headerText: '#ffffff',   // White
            totalAllBg: '#4f46e5',   // Indigo-600
            totalAllText: '#ffffff', // White
            subHeaderBg: '#f1f5f9',  // Slate-100
            subHeaderText: '#334155',// Slate-700
            rowEven: '#ffffff',      // White
            rowOdd: '#f8fafc',       // Slate-50
            totalRowBg: '#e0e7ff',   // Indigo-100
            totalRowText: '#3730a3', // Indigo-800
            border: '#cbd5e1',       // Slate-300
            thickBorder: '#475569',  // Slate-600 (Garis tebal)
            textNormal: '#1e293b',   // Slate-800
            textRed: '#dc2626',      // Red-600
            textGreen: '#16a34a'     // Green-600
        };

        const thickRight = { borderRight: `3px solid ${colors.thickBorder}` };

        // Helper untuk mewarnai angka secara kondisional
        const getNumberStyle = (actual, budget, isBalance = false) => {
            const balance = budget - actual;
            let color = colors.textNormal;
            let fontWeight = 'normal';

            if (budget > 0) {
                if (balance > 0) {
                    // Actual < Budget (Ada kekurangan / defisit)
                    color = colors.textRed;
                    fontWeight = 'bold';
                } else if (balance === 0) {
                    // Actual == Budget (Target terpenuhi pas)
                    color = colors.textGreen;
                    fontWeight = 'bold';
                }
            }
            
            return { color, fontWeight };
        };

        function App() {
            const [months, setMonths] = useState(defaultMonths);
            const [categories, setCategories] = useState(defaultCategories);
            const [budgets, setBudgets] = useState(defaultBudgets);
            const [actuals, setActuals] = useState(defaultActuals);
            
            const [selectedMonth, setSelectedMonth] = useState('Apr-26');
            const [inputType, setInputType] = useState('actual');
            const [newMonthStr, setNewMonthStr] = useState('');
            const [newCategoryStr, setNewCategoryStr] = useState('');

            const [messageModal, setMessageModal] = useState('');
            const [confirmModal, setConfirmModal] = useState(null);
            
            const [syncStatus, setSyncStatus] = useState('connecting'); 
            const isLocalChange = useRef(false);

            useEffect(() => {
                const fetchAndSubscribe = async () => {
                    const { data, error } = await supabaseClient.from('karyawan_data').select('*').eq('id', 'main_doc').single();

                    if (data) {
                        isLocalChange.current = false;
                        setMonths(data.months || defaultMonths);
                        setCategories(data.categories || defaultCategories);
                        setBudgets(data.budgets || defaultBudgets);
                        setActuals(data.actuals || defaultActuals);
                        if (data.months && data.months.length > 0 && !data.months.includes(selectedMonth)) setSelectedMonth(data.months[0]);
                        setSyncStatus('synced');
                    } else {
                        if (error && error.code === 'PGRST116') setSyncStatus('synced');
                        else if (error && error.code === 'PGRST205') {
                            console.warn("Tabel belum dibuat di Supabase.");
                            setSyncStatus('error');
                            setMessageModal('PENTING: Tabel "karyawan_data" belum ada di Supabase. Anda harus membuat tabel terlebih dahulu di Dashboard Supabase Anda.');
                        } else setSyncStatus('error');
                    }

                    const channel = supabaseClient.channel('schema-db-changes').on(
                        'postgres_changes', { event: '*', schema: 'public', table: 'karyawan_data', filter: 'id=eq.main_doc' },
                        (payload) => {
                            if (payload.new) {
                                isLocalChange.current = false;
                                setMonths(payload.new.months || defaultMonths);
                                setCategories(payload.new.categories || defaultCategories);
                                setBudgets(payload.new.budgets || defaultBudgets);
                                setActuals(payload.new.actuals || defaultActuals);
                            }
                        }
                    ).subscribe();

                    return () => supabaseClient.removeChannel(channel);
                };
                fetchAndSubscribe();
            }, []);

            useEffect(() => {
                if (!isLocalChange.current) return;
                setSyncStatus('saving');
                const timeoutId = setTimeout(async () => {
                    localStorage.setItem('karyawan_data_local', JSON.stringify({ months, categories, budgets, actuals }));
                    try {
                        const { error } = await supabaseClient.from('karyawan_data').upsert({ id: 'main_doc', months, categories, budgets, actuals });
                        if (error) throw error;
                        setSyncStatus('synced');
                        isLocalChange.current = false;
                    } catch (error) {
                        if (error.code === 'PGRST205') isLocalChange.current = false;
                        setSyncStatus('error');
                    }
                }, 800);
                return () => clearTimeout(timeoutId);
            }, [months, categories, budgets, actuals]);

            const calculatedData = useMemo(() => {
                const calc = {}; const totals = {}; let carryover = {};
                categories.forEach(cat => { totals[cat] = { b: 0, a: 0, bal: 0 }; carryover[cat] = 0; });

                months.forEach(month => {
                    calc[month] = {};
                    categories.forEach(cat => {
                        const budget = budgets[month]?.[cat] || 0;
                        const inputActual = actuals[month]?.[cat] || 0;
                        const effectiveInput = inputActual + carryover[cat];
                        let actualRendered = effectiveInput;
                        let balanceRendered = budget - actualRendered;
                        let nextCarry = 0;

                        if (balanceRendered < 0) {
                            actualRendered = budget;
                            nextCarry = Math.abs(balanceRendered);
                            balanceRendered = 0;
                        }

                        calc[month][cat] = { budget, actual: actualRendered, balance: balanceRendered };
                        carryover[cat] = nextCarry;

                        totals[cat].b += budget; totals[cat].a += actualRendered; totals[cat].bal += balanceRendered;
                    });
                });

                const monthlyTotals = {};
                months.forEach(month => {
                    let b = 0, a = 0, bal = 0;
                    categories.forEach(cat => { b += calc[month][cat].budget; a += calc[month][cat].actual; bal += calc[month][cat].balance; });
                    monthlyTotals[month] = { budget: b, actual: a, balance: bal };
                });

                let gb = 0, ga = 0, gbal = 0;
                categories.forEach(cat => { gb += totals[cat].b; ga += totals[cat].a; gbal += totals[cat].bal; });
                const grandTotal = { budget: gb, actual: ga, balance: gbal };

                return { calc, totals, monthlyTotals, grandTotal };
            }, [months, categories, budgets, actuals]);

            const handleInputChange = (field, value) => {
                isLocalChange.current = true;
                const numValue = value === '' ? '' : Number(value);
                if (inputType === 'actual') setActuals(prev => ({ ...prev, [selectedMonth]: { ...prev[selectedMonth], [field]: numValue } }));
                else setBudgets(prev => ({ ...prev, [selectedMonth]: { ...prev[selectedMonth], [field]: numValue } }));
            };

            const handleAddMonth = () => {
                if (!newMonthStr.trim() || months.includes(newMonthStr.trim())) return;
                isLocalChange.current = true;
                const newM = newMonthStr.trim();
                setMonths(prev => [...prev, newM]); setBudgets(prev => ({ ...prev, [newM]: {} })); setActuals(prev => ({ ...prev, [newM]: {} }));
                setNewMonthStr(''); setSelectedMonth(newM);
            };

            const handleDeleteMonth = (monthToDelete) => {
                if (months.length <= 1) { setMessageModal('Gagal: Minimal harus ada 1 bulan tersisa!'); return; }
                setConfirmModal({
                    message: `Yakin ingin menghapus kolom bulan ${monthToDelete}?`,
                    onConfirm: () => {
                        isLocalChange.current = true;
                        const newMonths = months.filter(m => m !== monthToDelete);
                        setMonths(newMonths);
                        if (selectedMonth === monthToDelete) setSelectedMonth(newMonths[0]);
                    }
                });
            };

            const handleAddCategory = () => {
                const newCat = newCategoryStr.trim().toUpperCase();
                if (!newCat || categories.includes(newCat)) return;
                isLocalChange.current = true;
                setCategories(prev => [...prev, newCat]); setNewCategoryStr('');
            };

            const handleDeleteCategory = (catToDelete) => {
                if (categories.length <= 1) { setMessageModal('Gagal: Minimal harus ada 1 kategori baris tersisa!'); return; }
                setConfirmModal({
                    message: `Yakin ingin menghapus baris kategori ${catToDelete}?`,
                    onConfirm: () => { isLocalChange.current = true; setCategories(categories.filter(c => c !== catToDelete)); }
                });
            };

            const handleClearData = () => {
                setConfirmModal({
                    message: 'Reset semua data kembali ke pengaturan awal?',
                    onConfirm: () => {
                        isLocalChange.current = true;
                        setMonths(defaultMonths); setCategories(defaultCategories); setBudgets(defaultBudgets); setActuals(defaultActuals); setSelectedMonth(defaultMonths[0]);
                    }
                });
            };

            const generateHTMLString = () => {
                const table = document.getElementById('dataTable').outerHTML;
                return `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="utf-8" />
                        <style>
                            table { border-collapse: collapse; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; }
                            th, td { border: 1px solid ${colors.border}; padding: 8px; }
                        </style>
                    </head>
                    <body>${table}</body>
                    </html>
                `;
            };

            const handleExportExcelWithStyle = () => {
                const html = generateHTMLString();
                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'Data_Karyawan_Modern.xls'; a.click(); URL.revokeObjectURL(url);
            };

            const cellStyle = { border: `1px solid ${colors.border}`, padding: '0.5rem 0.75rem' };
            const headerStyle = { ...cellStyle, backgroundColor: colors.headerBg, color: colors.headerText, fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.05em', fontSize: '0.75rem' };
            const totalAllHeaderStyle = { ...headerStyle, backgroundColor: colors.totalAllBg };
            const subHeaderStyle = { ...cellStyle, backgroundColor: colors.subHeaderBg, color: colors.subHeaderText, fontWeight: '600', fontSize: '0.8rem' };

            return (
                <div className="min-h-screen p-3 sm:p-6 md:p-10 text-slate-800 flex flex-col items-center relative w-full overflow-hidden">
                    {/* MODALS */}
                    {messageModal && (
                        <div className="fixed inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50 px-4 transition-all">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm text-center transform scale-100">
                                <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mb-4"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                                <p className="mb-6 font-medium text-slate-700">{messageModal}</p>
                                <button onClick={() => setMessageModal('')} className="bg-blue-600 hover:bg-blue-700 text-white font-medium px-8 py-2.5 rounded-xl shadow-md transition-all active:scale-95">Mengerti</button>
                            </div>
                        </div>
                    )}

                    {confirmModal && (
                        <div className="fixed inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50 px-4 transition-all">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm text-center">
                                <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mb-4"><IconTrash /></div>
                                <p className="mb-6 font-medium text-slate-700 leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3 w-full">
                                    <button onClick={() => setConfirmModal(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-4 py-2.5 rounded-xl transition-all">Batal</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal(null); }} className="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition-all active:scale-95">Ya, Lanjutkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="w-full max-w-[1450px]">
                        {/* Header Atas */}
                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-5 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="p-2 bg-slate-50 rounded-xl border border-slate-100 shadow-sm">
                                    <img src="hoplun128.png" alt="Logo Hop Lun" className="h-10 w-auto object-contain" onError={(e) => { e.target.style.display = 'none'; }} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight">Sistem Data Karyawan</h1>
                                    <div className="flex items-center gap-2 mt-1.5">
                                        {syncStatus === 'synced' && <><div className="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div><span className="text-xs font-medium text-emerald-700">Tersinkronisasi Realtime</span></>}
                                        {syncStatus === 'error' && <><div className="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div><span className="text-xs font-medium text-red-700">Tidak Sinkron / Offline</span></>}
                                        {syncStatus === 'saving' && <><div className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse"></div><span className="text-xs font-medium text-amber-700">Menyimpan Perubahan...</span></>}
                                        {syncStatus === 'connecting' && <><div className="w-2.5 h-2.5 rounded-full bg-slate-400 animate-pulse"></div><span className="text-xs font-medium text-slate-500">Menghubungkan...</span></>}
                                    </div>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-3">
                                <button onClick={handleClearData} className="flex items-center gap-2 bg-white hover:bg-slate-50 text-red-600 border border-slate-200 font-medium px-5 py-2.5 rounded-xl shadow-sm transition-all active:scale-95">
                                    <IconTrash /> Reset Data
                                </button>
                                <button onClick={handleExportExcelWithStyle} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-xl shadow-sm shadow-emerald-600/20 transition-all active:scale-95">
                                    <IconDownload /> Export Excel
                                </button>
                            </div>
                        </div>

                        {/* PANEL KONTROL */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 w-full">
                            
                            {/* Panel Input Form */}
                            <div className="lg:col-span-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-indigo-600 px-5 py-3.5 flex justify-between items-center">
                                    <h2 className="text-white font-semibold flex items-center gap-2 text-sm sm:text-base">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                        Panel Input Data
                                    </h2>
                                </div>
                                <div className="p-4 sm:p-5">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Pilih Bulan</label>
                                            <div className="relative">
                                                <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="w-full appearance-none bg-slate-50 border border-slate-200 text-slate-800 font-medium py-2.5 pl-3 pr-10 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow cursor-pointer">
                                                    {months.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Mode Input</label>
                                            <div className="relative">
                                                <select value={inputType} onChange={(e) => setInputType(e.target.value)} className="w-full appearance-none bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-2.5 pl-3 pr-10 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow cursor-pointer">
                                                    <option value="actual">🔢 Input Aktual</option>
                                                    <option value="budget">🎯 Set Target / Budget</option>
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-indigo-500">
                                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        {categories.map((cat) => (
                                            <div key={cat} className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 p-3 rounded-xl border border-slate-100 bg-slate-50 hover:border-slate-300 transition-colors">
                                                <div className="flex-1 flex justify-between items-center pr-2">
                                                    <span className="font-semibold text-sm text-slate-700">{cat}</span>
                                                    <button onClick={() => handleDeleteCategory(cat)} className="text-slate-400 hover:text-red-500 p-1 rounded-md hover:bg-white transition-colors" title="Hapus Kategori"><IconX /></button>
                                                </div>
                                                <div className="w-full sm:w-1/3">
                                                    <input type="number" value={inputType === 'actual' ? (actuals[selectedMonth]?.[cat] ?? '') : (budgets[selectedMonth]?.[cat] ?? '')} onChange={(e) => handleInputChange(cat, e.target.value)} className="w-full text-right font-semibold text-slate-800 bg-white border border-slate-200 py-2 px-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-inner" placeholder="0" />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Panel Tambah */}
                            <div className="lg:col-span-6 flex flex-col gap-6">
                                {/* Tambah Kategori */}
                                <div className="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col justify-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-emerald-50 rounded-bl-full -z-10"></div>
                                    <h3 className="font-semibold text-slate-800 mb-1 text-sm sm:text-base">Tambah Kategori Baru (Baris)</h3>
                                    <p className="text-xs text-slate-500 mb-4">Tambahkan baris kriteria karyawan baru ke dalam tabel.</p>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input type="text" value={newCategoryStr} onChange={(e) => setNewCategoryStr(e.target.value)} className="flex-1 border border-slate-200 py-2.5 px-4 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 uppercase text-sm font-medium placeholder-slate-400" placeholder="Contoh: STAFF IT..." />
                                        <button onClick={handleAddCategory} className="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-xl shadow-sm transition-all active:scale-95 font-medium whitespace-nowrap"><IconPlus /> Tambah</button>
                                    </div>
                                </div>

                                {/* Tambah Bulan */}
                                <div className="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col justify-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-10"></div>
                                    <h3 className="font-semibold text-slate-800 mb-1 text-sm sm:text-base">Tambah Bulan Baru (Kolom)</h3>
                                    <p className="text-xs text-slate-500 mb-4">Tambahkan kolom periode/bulan baru ke dalam tabel.</p>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input type="text" value={newMonthStr} onChange={(e) => setNewMonthStr(e.target.value)} className="flex-1 border border-slate-200 py-2.5 px-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm font-medium placeholder-slate-400" placeholder="Contoh: Jul-26" />
                                        <button onClick={handleAddMonth} className="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl shadow-sm transition-all active:scale-95 font-medium whitespace-nowrap"><IconPlus /> Tambah</button>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* TABEL OUTPUT (Beautiful Table) */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full">
                            <div className="overflow-x-auto p-1 w-full" style={{ WebkitOverflowScrolling: 'touch' }}>
                                <table id="dataTable" className="border-collapse w-full min-w-max text-center" style={{ border: `1px solid ${colors.border}` }}>
                                    <thead>
                                        <tr>
                                            <th style={headerStyle} rowSpan="2" className="w-12">NO.</th>
                                            <th style={headerStyle} rowSpan="2" className="text-left">EMPLOYEE CATEGORIES</th>
                                            <th style={{...headerStyle, ...thickRight}} rowSpan="2" className="w-28 text-left">DETAIL</th>
                                            {months.map(m => (
                                                <th key={m} colSpan="3" style={{...headerStyle, ...thickRight}} className="relative group">
                                                    <div className="flex justify-center items-center gap-2">
                                                        {m}
                                                        {months.length > 1 && (
                                                            <button onClick={() => handleDeleteMonth(m)} className="text-slate-400 hover:text-white transition-colors" title="Hapus Bulan"><IconX /></button>
                                                        )}
                                                    </div>
                                                </th>
                                            ))}
                                            <th colSpan="3" style={totalAllHeaderStyle}>TOTAL ALL</th>
                                        </tr>
                                        <tr>
                                            {months.map(m => (
                                                <React.Fragment key={`sub-${m}`}>
                                                    <th style={subHeaderStyle} className="w-20">Budget</th>
                                                    <th style={subHeaderStyle} className="w-20">Actual</th>
                                                    <th style={{...subHeaderStyle, ...thickRight}} className="w-20">Balance</th>
                                                </React.Fragment>
                                            ))}
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b'}} className="w-24">Budget</th>
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b'}} className="w-24">Actual</th>
                                            <th style={{...subHeaderStyle, backgroundColor: '#e2e8f0', color: '#1e293b'}} className="w-24">Balance</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {categories.map((cat, idx) => {
                                            const isFirst = idx === 0;
                                            const bgColor = idx % 2 === 0 ? colors.rowEven : colors.rowOdd;
                                            
                                            return (
                                                <tr key={cat} className="hover:bg-slate-50 transition-colors">
                                                    {isFirst && <td rowSpan={categories.length} style={{...cellStyle, backgroundColor: colors.rowEven, fontWeight: 'bold', color: colors.textNormal, verticalAlign: 'middle'}}>1</td>}
                                                    <td style={{...cellStyle, backgroundColor: bgColor, textAlign: 'left', fontWeight: '500', color: colors.textNormal}}>{cat}</td>
                                                    {isFirst && <td style={{...cellStyle, backgroundColor: colors.rowEven, textAlign: 'left', color: colors.subHeaderText, ...thickRight}}>Requirement</td>}
                                                    {idx === 1 && <td rowSpan={categories.length - 1} style={{...cellStyle, backgroundColor: colors.rowEven, textAlign: 'left', color: colors.subHeaderText, verticalAlign: 'middle', ...thickRight}}>Target</td>}
                                                    
                                                    {months.map(m => {
                                                        const data = calculatedData.calc[m][cat];
                                                        // Format kondisional warna khusus
                                                        const actualStyle = getNumberStyle(data.actual, data.budget, false);
                                                        const balanceStyle = getNumberStyle(data.actual, data.budget, true);

                                                        return (
                                                            <React.Fragment key={`${cat}-${m}`}>
                                                                <td style={{...cellStyle, backgroundColor: bgColor, color: colors.textNormal}}>{data.budget}</td>
                                                                <td style={{...cellStyle, backgroundColor: bgColor, color: actualStyle.color, fontWeight: actualStyle.fontWeight}}>{data.actual}</td>
                                                                <td style={{...cellStyle, backgroundColor: bgColor, color: balanceStyle.color, fontWeight: balanceStyle.fontWeight, ...thickRight}}>{data.balance}</td>
                                                            </React.Fragment>
                                                        )
                                                    })}
                                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600', color: colors.textNormal}}>{calculatedData.totals[cat].b}</td>
                                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600', color: colors.textNormal}}>{calculatedData.totals[cat].a}</td>
                                                    <td style={{...cellStyle, backgroundColor: '#f8fafc', fontWeight: '600', color: colors.textNormal}}>{calculatedData.totals[cat].bal}</td>
                                                </tr>
                                            );
                                        })}
                                        {/* Baris TOTAL Terbawah */}
                                        <tr>
                                            <td colSpan="3" style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700', textAlign: 'left', letterSpacing: '0.05em', ...thickRight}}>GRAND TOTAL</td>
                                            {months.map(m => (
                                                <React.Fragment key={`total-${m}`}>
                                                    <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.monthlyTotals[m].budget}</td>
                                                    <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700'}}>{calculatedData.monthlyTotals[m].actual}</td>
                                                    <td style={{...cellStyle, backgroundColor: colors.totalRowBg, color: colors.totalRowText, fontWeight: '700', ...thickRight}}>{calculatedData.monthlyTotals[m].balance}</td>
                                                </React.Fragment>
                                            ))}
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '700'}}>{calculatedData.grandTotal.budget}</td>
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '700'}}>{calculatedData.grandTotal.actual}</td>
                                            <td style={{...cellStyle, backgroundColor: colors.totalAllBg, color: '#ffffff', fontWeight: '700'}}>{calculatedData.grandTotal.balance}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
